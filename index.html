<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রূপান্তর (RUPANTOR) — Will be live soon.</title>
<link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">
<link rel="manifest" href="favicon/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;700&family=Noto+Serif+Bengali:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================
     রূপান্তর (RUPANTOR) — Premium Coming Soon
     ============================================ */

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-deep: #050807;
    --bg-surface: #0c1210;
    --gold-primary: #d4af37;
    --gold-light: #f3e5ab;
    --emerald: #047857;
    --emerald-glow: rgba(16, 185, 129, 0.15);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.15);
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Noto Serif Bengali', Georgia, serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Premium Noise Texture Overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
    opacity: 0.5;
  }

  /* Dynamic Mouse Spotlight */
  .spotlight {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: radial-gradient(
      800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
      rgba(212, 175, 55, 0.07),
      transparent 40%
    );
    z-index: 0;
    transition: opacity 0.3s ease;
  }

  /* Ambient Background Glows */
  .ambient-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -2;
    opacity: 0.4;
    animation: ambientPulse 12s ease-in-out infinite alternate;
  }

  .glow-1 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(4, 120, 87, 0.3) 0%, transparent 70%);
    top: -200px;
    left: -100px;
  }

  .glow-2 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
    bottom: -150px;
    right: -100px;
    animation-delay: -6s;
  }

  @keyframes ambientPulse {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.2) translate(20px, -20px); }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    color: var(--gold-primary);
    animation: floatUp linear infinite;
    pointer-events: none;
    will-change: transform, opacity;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(110vh) translateX(0) rotate(0deg);
      opacity: 0;
    }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% {
      transform: translateY(-10vh) translateX(40px) rotate(360deg);
      opacity: 0;
    }
  }

  /* Main container */
  .container {
    width: 100%;
    max-width: 800px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  /* Logo */
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
    animation: fadeInDown 1s cubic-bezier(0.23, 1, 0.32, 1) both;
  }

  .logo-image {
    width: 100px;
    height: auto;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
    animation: logoFloat 6s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo-text {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5em;
    color: var(--gold-primary);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0.9;
  }

  .logo-name {
    font-family: 'Noto Serif Bengali', serif;
    font-weight: 900;
    font-size: 2.5rem;
    color: var(--text-primary);
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
  }

  /* Hero text */
  .hero-text {
    margin-bottom: 3rem;
    animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
  }

  .hero-tagline {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.4em;
    color: var(--gold-primary);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: inline-block;
    padding: 0.4rem 1rem;
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 100px;
    background: rgba(212, 175, 55, 0.05);
  }

  .hero-title {
    font-family: 'Noto Serif Bengali', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 7vw, 4rem);
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 0%, var(--gold-primary) 50%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 6s linear infinite;
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  .hero-subtitle {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    font-weight: 300;
    color: var(--text-secondary);
    max-width: 580px;
    margin: 0 auto;
    line-height: 1.8;
  }

  /* Card display with 3D Tilt */
  .card-display {
    margin: 1rem 0 3rem;
    perspective: 1000px;
    animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 0.4s both;
    cursor: pointer;
  }

  .rupantor-card {
    width: 240px;
    height: 336px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212, 175, 55, 0.3);
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.8),
      0 0 0 1px rgba(255, 255, 255, 0.05),
      inset 0 0 20px rgba(212, 175, 55, 0.05);
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
    animation: subtleFloat 6s ease-in-out infinite;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  }

  @keyframes subtleFloat {
    0%, 100% { transform: perspective(1000px) translateY(0); }
    50% { transform: perspective(1000px) translateY(-10px); }
  }

  /* Holographic shine effect on hover */
  .rupantor-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255, 255, 255, 0.1) 45%,
      rgba(255, 255, 255, 0.25) 50%,
      rgba(255, 255, 255, 0.1) 55%,
      transparent 60%
    );
    transform: translateX(-100%);
    transition: transform 0.8s ease;
    z-index: 2;
    pointer-events: none;
  }

  .rupantor-card:hover::before {
    transform: translateX(100%);
  }

  .card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  /* Glow effect behind card */
  .card-display::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
    z-index: -1;
    filter: blur(40px);
    animation: glowPulse 4s ease-in-out infinite alternate;
  }

  @keyframes glowPulse {
    0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
  }

  /* Decorative divider */
  .decorative-line {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin: 1rem 0 2.5rem;
    color: var(--gold-primary);
    opacity: 0.4;
    font-size: 0.8rem;
    letter-spacing: 0.5em;
    animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 0.8s both;
  }

  .decorative-line::before,
  .decorative-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
  }

  /* Features list */
  .features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 3rem;
    animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 1s both;
  }

  .feature-pill {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    padding: 0.6rem 1.2rem;
    border-radius: 100px;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(8px);
  }

  .feature-pill:hover {
    background: rgba(212, 175, 55, 0.1);
    border-color: var(--gold-primary);
    color: var(--gold-light);
    transform: translateY(-4px);
    box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.2);
  }

  .feature-pill-icon {
    font-size: 1rem;
    filter: grayscale(0.2);
  }

  /* Footer */
  .footer {
    margin-top: auto;
    text-align: center;
    animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) 1.2s both;
  }

  .footer-social {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .social-link {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 700;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(8px);
  }

  .social-link:hover {
    background: var(--gold-primary);
    color: var(--bg-deep);
    transform: translateY(-4px) scale(1.1);
    box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.4);
    border-color: var(--gold-primary);
  }

  .footer-text {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .footer-text strong {
    color: var(--gold-primary);
    font-weight: 600;
  }

  /* Animations */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 2rem 1.25rem; }
    .logo-image { width: 80px; }
    .logo-name { font-size: 2rem; }
    .rupantor-card { width: 200px; height: 280px; }
    .features { gap: 0.75rem; }
    .feature-pill { padding: 0.5rem 1rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

  <!-- Ambient Background Elements -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>
  <div class="spotlight"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="Rupantor Logo.png" alt="Rupantor Logo" class="logo-image">
      <div class="logo-text">RUPANTOR</div>
      <div class="logo-name">রূপান্তর</div>
    </div>

    <!-- Hero text -->
    <div class="hero-text">
      <div class="hero-tagline">শীঘ্রই লাইভ হবে</div>
      <h1 class="hero-title">সবকিছু পরিবর্তিত হয়</h1>
      <p class="hero-subtitle">
        একটি রূপান্তরমূলক কার্ড গেম — যেখানে আপনি রঙ মেলান না, সংখ্যা মেলান না।<br>
        আপনি বিশ্ব-অবস্থাকে রূপান্তর করেন।
      </p>
    </div>

    <!-- Card display -->
    <div class="card-display">
      <div class="rupantor-card">
        <img src="Card Back Rupantor.png" alt="Rupantor Card" class="card-image">
      </div>
    </div>

    <!-- Decorative divider -->
    <div class="decorative-line">◆</div>

    <!-- Features pills -->
    <div class="features">
      <div class="feature-pill"><span class="feature-pill-icon">🌍</span> বিশ্ব-অবস্থা</div>
      <div class="feature-pill"><span class="feature-pill-icon">⛓</span> চেইন</div>
      <div class="feature-pill"><span class="feature-pill-icon">🎯</span> মিশন</div>
      <div class="feature-pill"><span class="feature-pill-icon">🌱</span> প্রকৃতি</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-social">
        <a href="https://web.facebook.com/profile.php?id=61591592052760" class="social-link" aria-label="Facebook" title="Facebook">f</a>
      </div>
      <p class="footer-text">
        © ২০২৬ <strong>রূপান্তর (RUPANTOR)</strong> • SBL
      </p>
    </div>

  </div>

<script>
  // ============================================
  // Dynamic Mouse Spotlight
  // ============================================
  document.addEventListener('mousemove', (e) => {
    document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
    document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
  });

  // ============================================
  // Enhanced Floating Particles
  // ============================================
  (function createParticles() {
    const container = document.getElementById('particles');
    const symbols = ['🍃', '🌿', '✦', '◆', '🌱', '✨'];
    const count = 25;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
      p.style.animationDuration = (Math.random() * 15 + 15) + 's';
      p.style.animationDelay = (Math.random() * 20) + 's';
      p.style.opacity = Math.random() * 0.5 + 0.1;
      p.style.filter = `blur(${Math.random() * 2}px)`;
      container.appendChild(p);
    }
  })();

  // ============================================
  // Premium 3D Tilt Effect for Card
  // ============================================
  const cardContainer = document.querySelector('.card-display');
  const card = document.querySelector('.rupantor-card');

  if (cardContainer && card) {
    cardContainer.addEventListener('mouseenter', () => {
      card.style.animation = 'none';
      card.style.transition = 'transform 0.1s ease-out';
    });

    cardContainer.addEventListener('mousemove', (e) => {
      const rect = cardContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      const rotateX = ((y - centerY) / centerY) * -10;
      const rotateY = ((x - centerX) / centerX) * 10;

      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.08, 1.08, 1.08)`;
    });

    cardContainer.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
      card.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      setTimeout(() => {
        card.style.animation = 'subtleFloat 6s ease-in-out infinite';
      }, 600);
    });
  }
</script>

</body>
</html>
