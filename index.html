<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রূপান্তর (RUPANTOR) — শীঘ্রই লাইভ হবে</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Noto+Serif+Bengali:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================
     রূপান্তর — Coming Soon Page
     ============================================ */

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --primary: #1B2A1F;
    --sage: #2E7D5B;
    --terracotta: #C97B3C;
    --gold: #D4A84B;
    --cream: #FAF7F2;
    --leaf: #5A8F3D;
    --water: #3E8FB0;
    --sky: #4A6FA5;
    --earth: #8B6F47;
    --mystery: #5A2D8F;
  }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: 'Noto Serif Bengali', Georgia, serif;
    background: var(--primary);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    line-height: 1.6;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(46, 125, 91, 0.25) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(212, 168, 75, 0.18) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(201, 123, 60, 0.12) 0%, transparent 60%),
      linear-gradient(135deg, #0f1a14 0%, #1B2A1F 50%, #0f1a14 100%);
    z-index: -2;
    animation: bgShift 20s ease-in-out infinite;
  }

  @keyframes bgShift {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(2deg); }
  }

  /* Floating particles (leaves) */
  .particles {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    color: rgba(212, 168, 75, 0.4);
    font-size: 1.5rem;
    animation: float 15s linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% {
      transform: translateY(100vh) translateX(0) rotate(0deg);
      opacity: 0;
    }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% {
      transform: translateY(-100px) translateX(80px) rotate(360deg);
      opacity: 0;
    }
  }

  /* Main container */
  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.5rem;
    animation: fadeInDown 1s ease-out;
  }

  .logo-image {
    width: 120px;
    height: auto;
    margin-bottom: 1rem;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% {
      box-shadow:
        0 0 0 4px rgba(212, 168, 75, 0.3),
        0 0 40px rgba(46, 125, 91, 0.5),
        inset 0 -8px 16px rgba(0, 0, 0, 0.2);
    }
    50% {
      box-shadow:
        0 0 0 6px rgba(212, 168, 75, 0.5),
        0 0 60px rgba(46, 125, 91, 0.8),
        inset 0 -8px 16px rgba(0, 0, 0, 0.2);
    }
  }

  .logo-text {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .logo-name {
    font-family: 'Noto Serif Bengali', serif;
    font-weight: 900;
    font-size: 2.2rem;
    color: var(--cream);
    letter-spacing: 0.05em;
  }

  /* Hero text */
  .hero-text {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeInUp 1s ease-out 0.3s both;
  }

  .hero-tagline {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    color: var(--terracotta);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Noto Serif Bengali', serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--cream);
    margin-bottom: 1rem;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-subtitle {
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: rgba(250, 247, 242, 0.85);
    max-width: 540px;
    margin: 0 auto;
    font-style: italic;
  }

  /* Card display */
  .card-display {
    margin: 2rem 0;
    perspective: 1000px;
    animation: fadeInUp 1s ease-out 0.6s both;
  }

  .rupantor-card {
    width: 220px;
    height: 308px;
    border-radius: 16px;
    background: linear-gradient(145deg, var(--cream) 0%, #f0ede6 100%);
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 0 3px var(--gold),
      0 0 0 5px rgba(212, 168, 75, 0.2),
      inset 0 0 0 1px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    position: relative;
    transform-style: preserve-3d;
    animation: cardFloat 4s ease-in-out infinite, cardTilt 8s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.4s ease;
  }

  .rupantor-card:hover {
    animation-play-state: paused;
    transform: scale(1.05) rotateY(0deg) rotateX(0deg);
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  @keyframes cardTilt {
    0%, 100% { transform: translateY(0) rotateY(-8deg) rotateX(3deg); }
    50% { transform: translateY(-12px) rotateY(8deg) rotateX(-3deg); }
  }

  .card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }

  /* Glow effect behind card */
  .card-display::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(46, 125, 91, 0.4) 0%, transparent 60%);
    z-index: -1;
    filter: blur(30px);
    animation: glowPulse 4s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }


  /* Features list */
  .features {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.75rem;
    margin: 1.5rem 0;
    animation: fadeInUp 1s ease-out 1.5s both;
  }

  .feature-pill {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.4rem 0.85rem;
    border-radius: 20px;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.8rem;
    color: rgba(250, 247, 242, 0.85);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.3s ease;
  }

  .feature-pill:hover {
    background: rgba(212, 168, 75, 0.15);
    border-color: var(--gold);
    color: var(--cream);
  }

  .feature-pill-icon {
    font-size: 0.9rem;
  }

  /* Footer */
  .footer {
    margin-top: 2rem;
    text-align: center;
    animation: fadeInUp 1s ease-out 1.8s both;
  }

  .footer-social {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .social-link {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--cream);
    text-decoration: none;
    font-size: 1.1rem;
    transition: all 0.3s ease;
  }

  .social-link:hover {
    background: var(--gold);
    color: var(--primary);
    transform: translateY(-3px);
    border-color: var(--gold);
  }

  .footer-text {
    font-family: 'Noto Sans Bengali', sans-serif;
    font-size: 0.8rem;
    color: rgba(250, 247, 242, 0.5);
  }

  .footer-text strong {
    color: var(--gold);
  }

  /* Decorative elements */
  .decorative-line {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--gold);
    opacity: 0.6;
  }

  .decorative-line::before,
  .decorative-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* Animations */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }


  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 1.5rem 1rem; }
    .logo-mark { width: 70px; height: 70px; font-size: 2rem; }
    .logo-name { font-size: 1.8rem; }
    .rupantor-card { width: 180px; height: 252px; }
  }

</style>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="Rupantor Logo.png" alt="Rupantor Logo" class="logo-image">
      <div class="logo-text">RUPANTOR</div>
      <div class="logo-name">রূপান্তর</div>
    </div>

    <!-- Hero text -->
    <div class="hero-text">
      <div class="hero-tagline">শীঘ্রই লাইভ হবে</div>
      <h1 class="hero-title">সবকিছু পরিবর্তিত হয়</h1>
      <p class="hero-subtitle">
        একটি রূপান্তরমূলক কার্ড গেম — যেখানে আপনি রঙ মেলান না, সংখ্যা মেলান না।
        আপনি বিশ্ব-অবস্থাকে রূপান্তর করেন।
      </p>
    </div>

    <!-- Card display -->
    <div class="card-display">
      <div class="rupantor-card">
        <img src="Card Back Rupantor.png" alt="Rupantor Card" class="card-image">
      </div>
    </div>

    <!-- Decorative divider -->
    <div class="decorative-line">◆</div>

    <!-- Features pills -->
    <div class="features">
      <div class="feature-pill"><span class="feature-pill-icon">🌍</span> বিশ্ব-অবস্থা রূপান্তর</div>
      <div class="feature-pill"><span class="feature-pill-icon">⛓</span> চেইন গঠন</div>
      <div class="feature-pill"><span class="feature-pill-icon">🎯</span> গোপন মিশন</div>
      <div class="feature-pill"><span class="feature-pill-icon">🌱</span> প্রকৃতি থিম</div>
      <div class="feature-pill"><span class="feature-pill-icon">📱</span> সব ডিভাইসে</div>
    </div>


    <!-- Footer -->
    <div class="footer">
      <div class="footer-social">
        <a href="#" class="social-link" aria-label="Facebook" title="Facebook">f</a>
        <a href="#" class="social-link" aria-label="Instagram" title="Instagram">◉</a>
        <a href="#" class="social-link" aria-label="Twitter" title="Twitter">✦</a>
        <a href="#" class="social-link" aria-label="YouTube" title="YouTube">▶</a>
      </div>
      <p class="footer-text">
        © ২০২৬ <strong>রূপান্তর (RUPANTOR)</strong> • নীলগগনা গেমস প্রকাশন
      </p>
    </div>

  </div>

<script>
  // ============================================
  // Floating particles (leaves)
  // ============================================
  (function createParticles() {
    const container = document.getElementById('particles');
    const symbols = ['🍃', '🌿', '✦', '◆', '🌱'];
    const count = 18;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.fontSize = (Math.random() * 1 + 0.8) + 'rem';
      p.style.animationDuration = (Math.random() * 10 + 12) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(p);
    }
  })();



</script>

</body>
</html>
